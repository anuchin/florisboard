name: FlorisBoard CI

on:
  push:
    branches: [ main, feature/* ]
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/FUNDING.yml"
      - ".dockerignore"
      - ".editorconfig"
      - "fastlane/**"
      - "AI_POLICY.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"
      - "ROADMAP.md"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: gradle/actions/wrapper-validation@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.0.2
      - name: Build with Gradle
        run: ./gradlew clean assembleDebug --stacktrace 2>&1 | tee build.log
      - name: Print build log on failure
        if: failure()
        run: |
          echo "=== BUILD LOG (last 200 lines) ==="
          tail -200 build.log || true
      - name: List APK files
        run: find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APKs found"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: florisboard-debug-apk
          path: app/build/outputs/
